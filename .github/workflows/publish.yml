name: publish

# Publishes to npm when a GitHub Release is published.
#
# Uses npm Trusted Publishing (OIDC). No NPM_TOKEN exists: npm verifies this
# workflow's identity directly, so there is no secret in the repo to leak and
# nothing to rotate. The published package also carries a signed provenance
# statement linking it to the exact commit and workflow that built it.
#
# Configured on npm at Package -> Settings -> Trusted Publisher:
#   Owner: livetennisapi  Repo: livetennisapi-js
#   Workflow: publish.yml  Environment: npm  Permission: npm publish
#
# The first 1.0.0 release could not use this: npm requires a package to exist
# before OIDC can be configured, so it was published once with a short-lived
# token which has since been revoked.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/livetennisapi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run typecheck
      - run: npx vitest run test/client.test.ts
      - run: npm run build

      - name: Assert the tag matches package.json
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::release tag ($TAG) does not match package.json ($PKG)"
            exit 1
          fi
          echo "tag and version agree: $PKG"

      # npm >= 11.5.1 is required for OIDC trusted publishing.
      - run: npm install -g npm@latest

      - run: npm publish --provenance --access public
